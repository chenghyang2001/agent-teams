<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
#header { background: #1e293b; padding: 10px 18px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; border-bottom: 1px solid #334155; }
#header h1 { font-size: 15px; font-weight: 600; color: #38bdf8; white-space: nowrap; }
#counter { font-size: 13px; color: #94a3b8; }
#img-label { font-size: 13px; color: #cbd5e1; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#hint { font-size: 11px; color: #475569; white-space: nowrap; }
#zoom-badge { background: #334155; border-radius: 4px; padding: 2px 8px; font-size: 12px; color: #94a3b8; }
#viewer-wrap { flex: 1; overflow: hidden; position: relative; background: #0f172a; cursor: grab; }
#viewer-wrap.dragging { cursor: grabbing; }
#main-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; user-select: none; pointer-events: none; max-width: none; }
#prev-btn, #next-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30,41,59,0.85); border: 1px solid #334155; color: #38bdf8; font-size: 22px; width: 40px; height: 64px; cursor: pointer; border-radius: 6px; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background .15s; }
#prev-btn { left: 10px; }
#next-btn { right: 10px; }
#prev-btn:hover, #next-btn:hover { background: rgba(56,189,248,.2); }
#thumbs-wrap { flex-shrink: 0; background: #1e293b; border-top: 1px solid #334155; height: 80px; overflow-x: auto; overflow-y: hidden; display: flex; gap: 6px; padding: 6px 10px; }
#thumbs-wrap::-webkit-scrollbar { height: 4px; }
#thumbs-wrap::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
.thumb { flex-shrink: 0; height: 68px; width: auto; border: 2px solid transparent; border-radius: 4px; cursor: pointer; opacity: .6; transition: opacity .15s, border-color .15s; }
.thumb:hover { opacity: .85; }
.thumb.active { border-color: #38bdf8; opacity: 1; }
</style>
</head>

let cur = 0, scale = 1, tx = 0, ty = 0;
let dragging = false, dragX = 0, dragY = 0;

const viewer = document.getElementById("viewer-wrap");
const img = document.getElementById("main-img");
const badge = document.getElementById("zoom-badge");
const counter = document.getElementById("counter");
const label = document.getElementById("img-label");
const thumbsWrap = document.getElementById("thumbs-wrap");

function applyTransform() {
  img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  badge.textContent = Math.round(scale * 100) + "%";
}

function fitImage() {
  const PAD = 24;
  if (!img.naturalWidth) return;
  scale = Math.min((viewer.clientWidth - PAD*2) / img.naturalWidth,
                   (viewer.clientHeight - PAD*2) / img.naturalHeight);
  tx = (viewer.clientWidth  - img.naturalWidth  * scale) / 2;
  ty = (viewer.clientHeight - img.naturalHeight * scale) / 2;
  applyTransform();
}

function goTo(idx) {
  cur = (idx + IMAGES.length) % IMAGES.length;
  const entry = IMAGES[cur];
  img.onload = fitImage;
  img.src = entry.file;
  counter.textContent = (cur+1) + " / " + IMAGES.length;
  label.textContent = entry.label;
  document.querySelectorAll(".thumb").forEach((t, i) => {
    t.classList.toggle("active", i === cur);
  });
  const activeThumb = thumbsWrap.children[cur];
  if (activeThumb) activeThumb.scrollIntoView({ inline: "nearest", behavior: "smooth" });
}

IMAGES.forEach((entry, i) => {
  const t = document.createElement("img");
  t.src = entry.file;
  t.className = "thumb";
  t.title = entry.label;
  t.addEventListener("click", () => goTo(i));
  thumbsWrap.appendChild(t);
});

document.getElementById("prev-btn").addEventListener("click", () => goTo(cur - 1));
document.getElementById("next-btn").addEventListener("click", () => goTo(cur + 1));

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(cur + 1);
  else if (e.key === "ArrowLeft" || e.key === "ArrowUp") goTo(cur - 1);
});

viewer.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1/1.13;
  const newScale = Math.min(Math.max(scale * factor, 0.1), 25);
  const vr = viewer.getBoundingClientRect();
  const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

viewer.addEventListener("mousedown", e => {
  dragging = true; dragX = e.clientX - tx; dragY = e.clientY - ty;
  viewer.classList.add("dragging");
});
document.addEventListener("mousemove", e => {
  if (!dragging) return;
  tx = e.clientX - dragX; ty = e.clientY - dragY;
  applyTransform();
});
document.addEventListener("mouseup", () => { dragging = false; viewer.classList.remove("dragging"); });
viewer.addEventListener("dblclick", fitImage);

goTo(0);
